        .train-header select, .train-header input { padding: 6px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; }

        th { background-color: #e9ecef; font-size: 0.8em; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; }

        .status-btn { padding: 6px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; font-size: 0.8em; }
        .status-none { background-color: #e2e3e5; }
        .status-ontime { background-color: #28a745 !important; color: white !important; }
        .status-late { background-color: #dc3545 !important; color: white !important; }

    // --- FUNCIÓN DEL RELOJ EN TIEMPO REAL ---
    function actualizarReloj() {
        const ahora = new Date();
        const horas = String(ahora.getHours()).padStart(2, '0');
        const minutos = String(ahora.getMinutes()).padStart(2, '0');
        const segundos = String(ahora.getSeconds()).padStart(2, '0');
        document.getElementById('reloj-tiempo-real').innerText = `${horas}:${minutos}:${segundos}`;
    }

    // --- FUNCIONES DE AUTOGUARDADO ---
    function guardarEstado() {
        const cards = document.querySelectorAll('.train-card');
        const estado = [];

        cards.forEach(card => {
            const idNumber = card.id.split('-')[1];
            const dia = document.getElementById(`dia-${idNumber}`).value;
            const tren = document.getElementById(`tren-num-${idNumber}`).value;
            const ruta = document.getElementById(`route-${idNumber}`).value;
            
            const eqTipo = document.getElementById(`eq-tipo-${idNumber}`).value;
            const eqNum = document.getElementById(`eq-num-${idNumber}`).value;
            
            const filas = [];
            const rows = card.querySelectorAll('tbody tr');
            rows.forEach((row, index) => {
                const rowId = `row-${idNumber}-${index}`;
                const time = document.getElementById(`time-${rowId}`).value;
                const btn = document.getElementById(`btn-${rowId}`);
                const statusClass = btn.classList.contains('status-ontime') ? 'status-ontime' : 
                                    btn.classList.contains('status-late') ? 'status-late' : 'status-none';
                const btnText = btn.innerText;
                const obs = document.getElementById(`obs-${rowId}`).value;
                
                filas.push({ time, statusClass, btnText, obs });
            });

            estado.push({ idNumber, dia, tren, ruta, eqTipo, eqNum, filas });
        });

        localStorage.setItem('bitacoraEfeSur', JSON.stringify(estado));
        localStorage.setItem('serviceCount', serviceCount);
    }

    window.onload = function() {
        // Iniciar el reloj de inmediato y que se actualice cada segundo
        actualizarReloj();
        setInterval(actualizarReloj, 1000);

        const datosGuardados = localStorage.getItem('bitacoraEfeSur');
        if (datosGuardados) {
            const estado = JSON.parse(datosGuardados);
            serviceCount = parseInt(localStorage.getItem('serviceCount')) || 0;
            estado.forEach(data => crearTarjetaDesdeDatos(data));
        } else {
            addService();
        }
    };

    // --- FUNCIONES DE CREACIÓN DE TARJETAS ---
    function addService() {
        serviceCount++;
        crearEstructuraTarjeta(serviceCount);
        updateTable(serviceCount, "l2_ida");
        guardarEstado();
    }

    function crearEstructuraTarjeta(id) {
        const list = document.getElementById('services-list');

    function crearTarjetaDesdeDatos(data) {
        crearEstructuraTarjeta(data.idNumber);
        document.getElementById(`dia-${data.idNumber}`).value = data.dia;
        document.getElementById(`tren-num-${data.idNumber}`).value = data.tren;
        document.getElementById(`route-${data.idNumber}`).value = data.ruta;

        if (data.eqTipo) document.getElementById(`eq-tipo-${data.idNumber}`).value = data.eqTipo;
        if (data.eqNum) document.getElementById(`eq-num-${data.idNumber}`).value = data.eqNum;

        const tbody = document.getElementById(`body-${data.idNumber}`);
        const stations = rutas[data.ruta];
        tbody.innerHTML = "";

        stations.forEach((st, index) => {
            const filaGuardada = data.filas[index] || { time: "", statusClass: "status-none", btnText: "-", obs: "" };
            const rowId = `row-${data.idNumber}-${index}`;
            const displayObs = filaGuardada.statusClass === 'status-late' ? 'visible' : '';

            tbody.innerHTML += `<tr>
                <td style="font-weight:600; font-size:0.85em;">${st}</td>
                <td><input type="text" id="time-${rowId}" class="time-input" placeholder="--:--" value="${filaGuardada.time}" onchange="guardarEstado()"></td>
                <td><button class="status-btn ${filaGuardada.statusClass}" id="btn-${rowId}" onclick="toggleStatus('${rowId}')">${filaGuardada.btnText}</button></td>
                <td><input type="text" id="obs-${rowId}" class="obs-input ${displayObs}" placeholder="¿Motivo?" value="${filaGuardada.obs}" onchange="guardarEstado()"></td>
            </tr>`;
        });
    }

    // --- FUNCIONES DE OPERACIÓN ---
    function updateTable(id, routeKey) {
        const tbody = document.getElementById(`body-${id}`);
        const stations = rutas[routeKey];
        tbody.innerHTML = "";
        stations.forEach((st, index) => {
            const rowId = `row-${id}-${index}`;
            tbody.innerHTML += `<tr>
                <td style="font-weight:600; font-size:0.85em;">${st}</td>
                <td><input type="text" id="time-${rowId}" class="time-input" placeholder="--:--" onchange="guardarEstado()"></td>
                <td><button class="status-btn status-none" id="btn-${rowId}" onclick="toggleStatus('${rowId}')">-</button></td>
                <td><input type="text" id="obs-${rowId}" class="obs-input" placeholder="¿Motivo?" onchange="guardarEstado()"></td>
            </tr>`;
        });
    }

    function buscarHorarios(id) {
        const numTren = document.getElementById(`tren-num-${id}`).value.trim();
        const dia = document.getElementById(`dia-${id}`).value;
        if(baseDatosTrenes[dia] && baseDatosTrenes[dia][numTren]) {
            const data = baseDatosTrenes[dia][numTren];
            document.getElementById(`route-${id}`).value = data.ruta;
            updateTable(id, data.ruta);
            data.horarios.forEach((hora, index) => {
                const input = document.getElementById(`time-row-${id}-${index}`);
                if(input && hora !== null) input.value = hora;
            });
            guardarEstado();
        } else {
            alert("El servicio no está en la memoria maestra. Puedes escribir los horarios a mano.");
        }
    }

    function toggleStatus(rowId) {
        const btn = document.getElementById(`btn-${rowId}`);
        const obs = document.getElementById(`obs-${rowId}`);
        if (btn.classList.contains('status-none')) { 
            btn.classList.replace('status-none', 'status-ontime'); 
            btn.innerText = "HORA"; 
            obs.classList.remove('visible'); 
        }
        else if (btn.classList.contains('status-ontime')) { 
            btn.classList.replace('status-ontime', 'status-late'); 
            btn.innerText = "ATRASO"; 
            obs.classList.add('visible'); 
            obs.focus(); 
        }
        else { 
            btn.classList.replace('status-late', 'status-none'); 
            btn.innerText = "-"; 
            obs.classList.remove('visible'); 
            obs.value = ""; 
        }
        guardarEstado();
    }

    function removeCard(id) {
        if(confirm("¿Quitar de la vista?")) {
            document.getElementById(`card-${id}`).remove();
            guardarEstado();
        }
    }

    function borrarTodo() {
        const cards = document.querySelectorAll('.train-card');
        if (cards.length === 0) {
            alert("No hay servicios para borrar.");
            return;
        }
        if (confirm("¿Estás seguro de querer eliminar TODO?\n\nSe borrarán los " + cards.length + " servicios cargados. Esta acción no se puede deshacer.")) {
            document.getElementById('services-list').innerHTML = '';
            serviceCount = 0;
            guardarEstado();
        }
    }

    // --- FUNCIONES DE DESCARGA Y REPORTES ---
    function downloadBitacoraCompleta() {
        document.querySelectorAll('input').forEach(input => input.setAttribute('value', input.value || ''));
        document.querySelectorAll('select').forEach(select => {
            Array.from(select.options).forEach(opt => {
                if (opt.value === select.value) opt.setAttribute('selected', 'selected');
                else opt.removeAttribute('selected');
            });
        });
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.setAttribute('class', btn.className);
            btn.innerHTML = btn.innerText;
        });

        const content = document.documentElement.outerHTML;
        const blob = new Blob([content], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Mi_Bitacora_Completa_${new Date().toLocaleDateString().replace(/\//g, '-')}.html`;
        a.click();
    }

    function downloadSimplificado() {
        const cards = document.querySelectorAll('.train-card');
        if(cards.length === 0) return alert("No hay datos cargados.");

        let reportHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
            body { font-family: Arial, sans-serif; padding: 20px; color: #333; }
            .report-card { border: 1px solid #ccc; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #f9f9f9; }
            .title { color: #003399; border-bottom: 2px solid #003399; padding-bottom: 5px; margin-bottom: 10px; font-weight: bold; }
            .item { margin-bottom: 8px; font-size: 1.1em; }
            .late { color: #d32f2f; font-weight: bold; }
            .ontime { color: #2e7d32; font-weight: bold; }
        </style></head><body><h2>Resumen Ejecutivo de Cabina - EFE Sur</h2><p>Fecha: ${new Date().toLocaleDateString()}</p>`;

        cards.forEach(card => {
            const idNumber = card.id.split('-')[1];
            const numTren = card.querySelector(`#tren-num-${idNumber}`).value || "[S/N]";
            
            const eqTipo = card.querySelector(`#eq-tipo-${idNumber}`).value;
            const eqNum = card.querySelector(`#eq-num-${idNumber}`).value;
            const infoEquipo = eqNum ? `${eqTipo}-${eqNum}` : "No Registrado";

            const rows = card.querySelectorAll('tbody tr');
            if(rows.length === 0) return;

            const { firstRow, lastRow } = obtenerTramosReales(rows);

            const stSalida = firstRow.cells[0].innerText;
            const btnSalida = firstRow.querySelector('.status-btn');
            const obsSalida = firstRow.querySelector('.obs-input').value;

            const stLlegada = lastRow.cells[0].innerText;
            const btnLlegada = lastRow.querySelector('.status-btn');
            const obsLlegada = lastRow.querySelector('.obs-input').value;

            let novedad = "";
            if(btnSalida.classList.contains('status-late')) novedad += `<li><b>Salida ${stSalida}:</b> <span class="late">Atraso</span> - ${obsSalida || 'Sin justificar'}</li>`;
            if(btnLlegada.classList.contains('status-late')) novedad += `<li><b>Llegada ${stLlegada}:</b> <span class="late">Atraso</span> - ${obsLlegada || 'Sin justificar'}</li>`;

            reportHTML += `<div class="report-card"><div class="title">Servicio ${numTren} | Equipo: ${infoEquipo}</div>`;
            if(novedad === "") {
                reportHTML += `<div class="item ontime">✓ Salida y llegada a horario.</div>`;
            } else {
                reportHTML += `<ul>${novedad}</ul>`;
            }
            reportHTML += `</div>`;
        });

        reportHTML += `</body></html>`;
        const blob = new Blob([reportHTML], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Reporte_Jefatura_${new Date().toLocaleDateString().replace(/\//g,'-')}.html`;
        a.click();
    }

    // --- Detecta el ORIGEN y DESTINO REAL del servicio ---
    // Busca la primera y la última estación que tengan horario cargado.
    // Así, si el tren parte desde Cristo Redentor, Los Canelos, La Leonera, etc.
    // (y no desde el inicio de la ruta completa), el mensaje se adapta solo.
    function obtenerTramosReales(rows) {
        let firstIdx = -1, lastIdx = -1;
        rows.forEach((row, i) => {
            const timeInput = row.querySelector('.time-input');
            if (timeInput && timeInput.value.trim() !== '') {
                if (firstIdx === -1) firstIdx = i;
                lastIdx = i;
            }
        });
        // Si todavía no hay horarios cargados, usa la ruta completa (primer y último tramo).
        if (firstIdx === -1) { firstIdx = 0; lastIdx = rows.length - 1; }
        return { firstRow: rows[firstIdx], lastRow: rows[lastIdx] };
    }

    //funcion whatsaaaaaappppp
   function enviarWhatsApp() {
    const cards = document.querySelectorAll('.train-card');
    if(cards.length === 0) return alert("No hay itinerarios para enviar.");

    // Encabezado actualizado según tu petición
    let textoReporte = `*NOVEDADES - EFE SUR*%0A`;
    textoReporte += `Fecha: ${new Date().toLocaleDateString()}%0A`;
    textoReporte += `----------------------------------------%0A%0A`;

    // --- Tripulación / Equipo: se imprime al inicio y SOLO cuando hay cambio ---
    // La tripulación "vigente" se arrastra: si en los servicios siguientes los
    // campos van en blanco, se entiende que sigue la misma tripulación y NO se
    // vuelve a mostrar. Solo cuando se ingresa un dato nuevo y distinto se
    // imprime el bloque, justo arriba del servicio donde ocurre el cambio.
    let curMaq = "No indicado", curAyu = "No indicado", curEq = "No Regist.";
    let primerBloque = true;
    const bloqueTripulacion = (maq, ayu, eq, esCambio) => {
        let b = "";
        if (esCambio) b += `*CAMBIO DE TRIPULACIÓN / EQUIPO*%0A`;
        b += `*Maquinista:* ${maq}%0A`;
        b += `*Ayudante:* ${ayu}%0A`;
        b += `*Equipo:* ${eq}%0A%0A`;
        return b;
    };

    cards.forEach(card => {
        const idNumber = card.id.split('-')[1];
        const numTren = card.querySelector(`#tren-num-${idNumber}`).value || "[S/N]";
        
        const eqTipo = card.querySelector(`#eq-tipo-${idNumber}`).value;
        const eqNum = card.querySelector(`#eq-num-${idNumber}`).value;
        const infoEquipo = eqNum ? `${eqTipo}-${eqNum}` : "No Regist.";

        // Valores REALMENTE ingresados en este servicio (vacío = sin dato).
        const maqRaw = (card.querySelector(`#maquinista-${idNumber}`).value || "").trim();
        const ayuRaw = (card.querySelector(`#ayudante-${idNumber}`).value || "").trim();
        const eqRaw  = eqNum ? `${eqTipo}-${eqNum}` : "";

        const rows = card.querySelectorAll('tbody tr');
        if(rows.length === 0) return;

        const { firstRow, lastRow } = obtenerTramosReales(rows);

        // Estaciones de Origen y Destino
        const stSalida = firstRow.cells[0].innerText;
        const btnSalida = firstRow.querySelector('.status-btn');
        const obsSalida = firstRow.querySelector('.obs-input').value;

        const stLlegada = lastRow.cells[0].innerText;
        const btnLlegada = lastRow.querySelector('.status-btn');
        const obsLlegada = lastRow.querySelector('.obs-input').value;

        // Lógica para determinar el texto de cada tramo
        let detalleSalida = "";
        if (btnSalida.classList.contains('status-late')) {
            detalleSalida = obsSalida || "Atraso";
        } else if (btnSalida.classList.contains('status-ontime')) {
            detalleSalida = "A horario";
        } else {
            detalleSalida = "Sin registro";
        }

        let detalleLlegada = "";
        if (btnLlegada.classList.contains('status-late')) {
            detalleLlegada = obsLlegada || "Atraso";
        } else if (btnLlegada.classList.contains('status-ontime')) {
            detalleLlegada = "A horario";
        } else {
            detalleLlegada = "Sin registro";
        }

        // Hay cambio SOLO si se ingresó un dato no vacío y distinto al vigente.
        // Si los campos van en blanco, se mantiene la tripulación anterior.
        let cambioTrip = false;
        if (maqRaw && maqRaw !== curMaq) cambioTrip = true;
        if (ayuRaw && ayuRaw !== curAyu) cambioTrip = true;
        if (eqRaw  && eqRaw  !== curEq)  cambioTrip = true;

        // Arrastre: solo se actualiza el dato que viene informado.
        if (maqRaw) curMaq = maqRaw;
        if (ayuRaw) curAyu = ayuRaw;
        if (eqRaw)  curEq  = eqRaw;

        if (primerBloque || cambioTrip) {
            textoReporte += bloqueTripulacion(curMaq, curAyu, curEq, !primerBloque);
            primerBloque = false;
        }

        // Construcción del mensaje del servicio
        textoReporte += `*Servicio ${numTren}*%0A`;
        textoReporte += `- Salida ${stSalida}: ${detalleSalida}%0A`;
        textoReporte += `- Llegada ${stLlegada}: ${detalleLlegada}%0A%0A`;
    });

    // Mantenemos la conversión del "+" para WhatsApp
    let textoFinal = textoReporte.replace(/\+/g, '%2B');

    const numero = document.getElementById("whatsapp-number").value;
    const url = `https://wa.me/${numero}?text=${textoFinal}`;
    window.open(url, '_blank');
}
